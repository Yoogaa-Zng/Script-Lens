<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>劇本結構分析工作台</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --plot:#185FA5; --static:#EF9F27; --text:#221f1a; --muted:#5F5E5A; --hint:#8b897f;
    --line:#D3D1C7; --warn-bg:#FFF4E0; --warn-border:#F0AD4E; --bg:#F7F5F0;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",-apple-system,sans-serif;background:var(--bg);color:var(--text);}
  .mono{font-family:"JetBrains Mono","SF Mono","Courier New",monospace;}

  .swb-header{padding:22px 24px 0;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#FBFAF7 0%,#F7F5F0 100%);}
  .swb-topline{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .swb-title-row{display:flex;align-items:baseline;gap:10px;}
  .swb-eyebrow{font-size:10.5px;letter-spacing:.14em;color:var(--hint);text-transform:uppercase;font-family:"JetBrains Mono",monospace;}
  .swb-title-input{font-size:22px;font-weight:700;border:none;background:transparent;color:var(--text);border-bottom:1.5px dashed transparent;padding:0 2px;min-width:80px;}
  .swb-title-input:hover,.swb-title-input:focus{border-bottom-color:var(--line);outline:none;}
  .swb-actions{display:flex;gap:8px;}

  .btn{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--text);cursor:pointer;}
  .btn:hover{border-color:var(--text);}
  .btn-dark{background:var(--text);color:#F7F5F0;border-color:var(--text);}
  .btn-ghost{border-color:transparent;background:transparent;}
  .btn-ghost:hover{background:#00000008;}
  .btn-sm{padding:4px 8px;font-size:11.5px;}
  .btn-danger{color:#B23A2E;}

  .mode-tabs{display:flex;gap:4px;margin:16px 0 0;}
  .tab-btn{font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:8px 8px 0 0;border:1px solid var(--line);border-bottom:none;cursor:pointer;background:transparent;color:var(--muted);}
  .tab-active{background:var(--text);color:#F7F5F0;}

  .swb-body{padding:18px 24px 60px;max-width:1180px;margin:0 auto;}

  .validation-bar{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;border-radius:8px;font-size:12px;line-height:1.7;margin-bottom:16px;}
  .validation-ok{background:#EEF7EF;border:1px solid #BFE0C4;color:#2B6B33;}
  .validation-err{background:var(--warn-bg);border:1px solid var(--warn-border);color:#7A4A0A;}

  .sub-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
  .sub-tab-btn{font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--muted);}
  .sub-tab-active{background:var(--text);color:#F7F5F0;border-color:var(--text);}

  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:16px;}
  .card-title{font-size:13px;font-weight:700;margin-bottom:4px;}
  .card-sub{font-size:11.5px;color:var(--hint);margin-bottom:14px;line-height:1.6;}

  .filmstrip-wrap{background:#14120f;border-radius:10px;padding:14px 0;overflow-x:auto;
    background-image:radial-gradient(circle,#3a362d 1.6px,transparent 1.7px),radial-gradient(circle,#3a362d 1.6px,transparent 1.7px);
    background-size:14px 100%,14px 100%;background-position:0 6px,0 calc(100% - 6px);background-repeat:repeat-x;}
  .filmstrip-track{display:flex;padding:12px 20px;min-width:max-content;align-items:flex-end;height:54px;}
  .fs-cell{width:4px;margin-right:1px;border-radius:1px;flex-shrink:0;}

  .grp-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #EEEBE3;}
  .grp-row:last-child{border-bottom:none;}
  .grp-name{width:168px;flex-shrink:0;font-size:12px;line-height:1.4;color:var(--muted);}
  .grp-bar-wrap{flex:1;display:flex;align-items:center;gap:8px;}
  .grp-bar-bg{flex:1;height:14px;border-radius:3px;overflow:hidden;display:flex;background:#F1EFE8;}
  .grp-total{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--hint);width:28px;text-align:right;}
  .act-label{font-size:10px;color:var(--hint);padding:8px 0 2px;font-family:monospace;}

  table.editor-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.editor-table th{text-align:left;font-size:10.5px;color:var(--hint);font-weight:600;padding:0 8px 6px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.04em;}
  table.editor-table td{padding:4px 8px;vertical-align:middle;}
  table.editor-table tr{border-bottom:1px solid #F0EEE7;}
  .cell-input{width:100%;border:1px solid transparent;background:transparent;padding:5px 6px;border-radius:6px;font-size:12.5px;color:var(--text);font-family:inherit;}
  .cell-input:hover{border-color:var(--line);}
  .cell-input:focus{border-color:var(--text);outline:none;background:#fff;}
  .cell-input.num{width:56px;text-align:right;font-family:"JetBrains Mono",monospace;}
  select.cell-input{width:64px;}

  .delta-track{display:flex;gap:3px;overflow-x:auto;padding:4px 0 8px;}
  .delta-btn{width:22px;height:22px;flex-shrink:0;border-radius:5px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:"JetBrains Mono",monospace;border:1px solid var(--line);}

  .theme-card,.profile-card{background:#FBFAF7;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px;}
  .field-label{font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;display:block;}
  .field-input{width:100%;border:1px solid var(--line);border-radius:6px;padding:6px 9px;font-size:12.5px;font-family:inherit;margin-bottom:8px;background:#fff;}
  textarea.field-input{resize:vertical;min-height:44px;line-height:1.6;}

  .warn-box{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:8px;padding:12px 14px;font-size:12px;line-height:1.8;color:#7A4A0A;white-space:pre-wrap;}

  .report-page{background:#fff;border:1px solid var(--line);border-radius:14px;padding:34px 36px;}
  .report-title{font-size:22px;font-weight:800;margin-bottom:2px;}
  .report-sub{font-size:11px;color:var(--hint);margin-bottom:16px;}
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:20px;}
  .stat-cell{text-align:center;padding:12px 4px;border-right:1px solid var(--line);}
  .stat-cell:last-child{border-right:none;}
  .stat-num{font-size:22px;font-weight:800;}
  .stat-label{font-size:10.5px;color:var(--muted);margin-top:2px;}

  .sec-heading{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:800;margin:26px 0 10px;}
  .sec-n{width:22px;height:22px;border-radius:50%;background:var(--text);color:#F7F5F0;font-size:11px;display:flex;align-items:center;justify-content:center;font-family:"JetBrains Mono",monospace;flex-shrink:0;}
  .sec-body-text{font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:10px;}

  .legend-row{display:flex;gap:16px;align-items:center;margin:8px 0 4px;font-size:11px;color:var(--muted);}
  .legend-dot{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:5px;}

  .export-modal{position:fixed;inset:0;background:#00000066;display:flex;align-items:center;justify-content:center;z-index:50;padding:24px;}
  .export-panel{background:#fff;border-radius:12px;max-width:720px;width:100%;max-height:82vh;display:flex;flex-direction:column;overflow:hidden;}
  .export-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
  .export-body{padding:16px 20px;overflow:auto;}
  .export-ta{width:100%;min-height:340px;font-family:"JetBrains Mono",monospace;font-size:11px;line-height:1.6;border:1px solid var(--line);border-radius:8px;padding:12px;background:#FBFAF7;color:var(--text);}

  .checklist-item{display:flex;gap:8px;align-items:flex-start;font-size:12px;padding:6px 0;border-bottom:1px solid #F0EEE7;}
  .checklist-item:last-child{border-bottom:none;}
  .profile-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
  .profile-mini{border:1px solid var(--line);border-radius:8px;padding:10px;font-size:11.5px;}

  @media print{
    body *{visibility:hidden;}
    #printable, #printable *{visibility:visible;}
    #printable{position:absolute;left:0;top:0;width:100%;}
    .report-page{border:none;padding:0;}
    @page{size:A4;margin:15mm;}
  }
</style>
</head>

/* ════════════════════════════════════════════════════════════════
   工具函式
   ════════════════════════════════════════════════════════════════ */
function esc(s){ return String(s??"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }

function computeActBoundaries(groups){
  const bounds = []; let cum = 0;
  for(let a=1;a<=5;a++){
    const cnt = groups.filter(g=>g.act===a).reduce((s,g)=>s+g.plot+g.static,0);
    const start = cum+1; cum += cnt;
    bounds.push([cnt>0?start:cum, cum]);
  }
  return bounds;
}
function computeActGroupRanges(groups){
  const ranges = {};
  groups.forEach((g,i)=>{
    if(!ranges[g.act]) ranges[g.act]=[i+1,i+1]; else ranges[g.act][1]=i+1;
  });
  return ranges;
}
function normalizeDeltas(arr,len){
  const out = arr.slice(0,len);
  while(out.length<len) out.push(0);
  return out;
}
function buildFilmstrip(groups){
  const cells = [];
  groups.forEach((g,gi)=>{
    for(let i=0;i<g.plot;i++) cells.push({type:"plot",act:g.act,gi});
    for(let i=0;i<g.static;i++) cells.push({type:"static",act:g.act,gi});
  });
  return cells;
}
function staticRuns(filmstrip){
  const runs=[]; let run=0,start=0;
  filmstrip.forEach((c,i)=>{
    if(c.type==="static"){ if(run===0) start=i; run++; }
    else { if(run>=3) runs.push({start,len:run}); run=0; }
  });
  if(run>=3) runs.push({start,len:run});
  return runs;
}
function validate(S){
  const errs=[];
  const groups=S.groups, characters=S.characters, cues=S.cues, themes=S.themes;
  const total = groups.reduce((s,g)=>s+g.plot+g.static,0);
  if(groups.length===0) errs.push("場組清單為空");
  groups.forEach((g,i)=>{
    if(!(g.act>=1 && g.act<=5)) errs.push(`場組 #${i+1}「${g.name||"未命名"}」act 必須在 1–5`);
    if(g.plot<0||g.static<0) errs.push(`場組 #${i+1}「${g.name||"未命名"}」plot/static 不可為負數`);
  });
  const acts = groups.map(g=>g.act);
  if(JSON.stringify(acts)!==JSON.stringify([...acts].sort((a,b)=>a-b))) errs.push("場組的 act 順序必須遞增（幕次不可回頭）");
  if(total===0) errs.push("場次總數為 0，無法計算比例");
  characters.forEach(ch=>{
    if(ch.deltas.length!==groups.length) errs.push(`角色「${ch.name}」的 delta 有 ${ch.deltas.length} 項，場組有 ${groups.length} 個，尚未同步`);
    const bad = ch.deltas.filter(d=>![-1,0,1].includes(d));
    if(bad.length) errs.push(`角色「${ch.name}」出現非 -1/0/+1 的值`);
  });
  const cueVals = cues.map(c=>c.count);
  if(JSON.stringify(cueVals)!==JSON.stringify([...cueVals].sort((a,b)=>b-a))) errs.push("台詞 cue 數尚未由高到低排列（報告會自動排序顯示，但建議手動同步）");
  if(!(themes.length>=3 && themes.length<=5)) errs.push(`主題必須 3–5 個，目前 ${themes.length} 個`);
  return errs;
}
const SCENE_PATTERNS = {
  auto: /^\s*(INT|EXT|INT\.?\/EXT|I\/E)[.\s]|^\s*(內景|外景|內\/外景|場景)[\s、:：]?|^\s*第?\s*\d{1,4}\s*[場场景](?!\S)|^\s*SCENE\s*\d+|^\s*S\d{1,4}\b/i,
  en: /^\s*(INT|EXT|INT\.?\/EXT|I\/E)[.\s]/i,
  zh: /^\s*(內景|外景|內\/外景|場景)[\s、:：]?/,
  numbered: /^\s*(第?\s*\d{1,4}\s*[場场景](?!\S)|SCENE\s*\d+|S\d{1,4}\b)/i,
};
const SCENE_PATTERN_LABELS = {
  auto: "自動（英式＋中式＋編號，建議先用這個）",
  en: "英式劇本（INT./EXT.）",
  zh: "中式劇本（內景／外景／場景）",
  numbered: "編號式（第1場／SCENE 1／S01）",
};

function detectSceneLines(text, patternKey){
  const re = SCENE_PATTERNS[patternKey] || SCENE_PATTERNS.auto;
  const rawLines = text.split(/\r?\n/);
  const matches = [];
  rawLines.forEach((line, idx) => {
    const t = line.trim();
    if(t.length===0) return;
    if(re.test(t)) matches.push({idx, text: t});
  });
  return matches;
}

// 粗略角色台詞頻率偵測（實驗性，務必人工核對）：
// 抓「短行＋冒號」或「短行全大寫」樣式，排除同時符合場景標題樣式的行
function detectCueFrequency(text, sceneRe, topN){
  const rawLines = text.split(/\r?\n/);
  const counts = {};
  const nameLineRe = /^([A-Za-z\u4e00-\u9fa5][A-Za-z\u4e00-\u9fa5 .]{0,9})[:：]\s*\S/;
  const capsRe = /^[A-Z][A-Z .]{1,14}$/;
  rawLines.forEach(line=>{
    const t = line.trim();
    if(!t || t.length>18) return;
    if(sceneRe.test(t)) return;
    let name = null;
    const m = t.match(nameLineRe);
    if(m) name = m[1].trim();
    else if(capsRe.test(t)) name = t.trim();
    if(!name || name.length<2) return;
    counts[name] = (counts[name]||0)+1;
  });
  return Object.entries(counts)
    .map(([name,count])=>({name,count}))
    .sort((a,b)=>b.count-a.count)
    .slice(0, topN||15);
}

async function extractPdfText(arrayBuffer){
  const pdf = await pdfjsLib.getDocument({data:arrayBuffer}).promise;
  const lines = [];
  for(let p=1;p<=pdf.numPages;p++){
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    let lastY=null, line=[];
    content.items.forEach(item=>{
      const y = Math.round(item.transform[5]);
      if(lastY!==null && Math.abs(y-lastY)>2){
        lines.push(line.join(""));
        line=[];
      }
      line.push(item.str);
      lastY=y;
    });
    if(line.length) lines.push(line.join(""));
    lines.push("");
  }
  return lines.join("\n");
}

   渲染函式

function renderFilmstrip(groups){
  const cells = buildFilmstrip(groups);
  return `<div class="filmstrip-wrap"><div class="filmstrip-track">${
    cells.map(c=>`<div class="fs-cell" style="background:${c.type==="plot"?"var(--plot)":"var(--static)"};height:${c.type==="plot"?34:24}px" title="${esc(groups[c.gi]?.name||"")}"></div>`).join("")
  }</div></div>`;
}
function renderGroupBars(groups){
  const max = Math.max(1, ...groups.map(g=>g.plot+g.static));
  let lastAct=null, html="";
  groups.forEach(g=>{
    if(g.act!==lastAct){ html += `<div class="act-label">${ACT_LABELS[g.act-1]}</div>`; lastAct=g.act; }
    const total=g.plot+g.static;
    const pPct=(g.plot/max)*100, sPct=(g.static/max)*100;
    html += `<div class="grp-row"><div class="grp-name">${esc(g.name)}</div><div class="grp-bar-wrap">
      <div class="grp-bar-bg"><div style="width:${pPct}%;background:var(--plot)"></div><div style="width:${sPct}%;background:var(--static)"></div></div>
      <div class="grp-total mono">${total}</div></div></div>`;
  });
  return html;
}
function renderCueBars(cues){
  const sorted = [...cues].sort((a,b)=>b.count-a.count);
  const max = Math.max(1, ...cues.map(c=>c.count));
  return sorted.map((c,i)=>`<div class="grp-row"><div class="grp-name" style="width:120px">${esc(c.name)}</div>
    <div class="grp-bar-wrap"><div class="grp-bar-bg"><div style="width:${(c.count/max)*100}%;background:${ARC_COLORS[i%ARC_COLORS.length]}"></div></div>
    <div class="grp-total mono">${c.count}</div></div></div>`).join("");
}
function renderArcChart(groups, characters){
  const n = groups.length;
  const series = characters.map(ch=>{
    const d = normalizeDeltas(ch.deltas, n);
    let cum=0; return {name:ch.name, values:d.map(v=>cum+=v)};
  });
  const allVals = series.flatMap(s=>s.values).concat([0]);
  const yMin = Math.min(...allVals)-1, yMax = Math.max(...allVals)+1;
  const w=900,h=260,ml=34,mr=14,mt=14,mb=24;
  const iw=w-ml-mr, ih=h-mt-mb;
  const x = i => ml + (n<=1?0:(i/(n-1))*iw);
  const y = v => mt + (1-(v-yMin)/(yMax-yMin))*ih;

  const actRanges = computeActGroupRanges(groups);
  const bands = Object.entries(actRanges).map(([act,[s,e]])=>{
    const x1 = x(s-1) - (n>1? iw/(n-1)/2 : 8), x2 = x(e-1) + (n>1? iw/(n-1)/2 : 8);
    return `<rect x="${x1}" y="${mt}" width="${x2-x1}" height="${ih}" fill="${ACT_BG[act-1]}" opacity="0.5"></rect>`;
  }).join("");

  const zeroY = y(0);
  const lines = series.map((s,ci)=>{
    const pts = s.values.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
    const dots = s.values.map((v,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="2.5" fill="${ARC_COLORS[ci%ARC_COLORS.length]}"><title>${esc(groups[i]?.name||"")}：${v}</title></circle>`).join("");
    return `<polyline points="${pts}" fill="none" stroke="${ARC_COLORS[ci%ARC_COLORS.length]}" stroke-width="2"></polyline>${dots}`;
  }).join("");

  const legend = characters.map((ch,i)=>`<span style="margin-right:14px;font-size:11px;color:var(--muted)"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${ARC_COLORS[i%ARC_COLORS.length]};margin-right:5px"></span>${esc(ch.name)}</span>`).join("");

  return `<div style="margin-bottom:6px">${legend}</div>
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block">
      ${bands}
      <line x1="${ml}" y1="${zeroY}" x2="${w-mr}" y2="${zeroY}" stroke="var(--line)" stroke-width="1"></line>
      ${lines}
    </svg>`;
}

        <td><input type="number" class="cell-input num" value="${c.count}" onchange="updateCue(${i},'count',this.value)"></td>
        <td><button class="btn btn-ghost btn-sm btn-danger" onclick="removeCue(${i})">✕</button></td>
      </tr>`).join("")}
      </tbody></table>
      <button class="btn btn-sm" style="margin-top:10px" onclick="addCue()">＋ 新增角色</button>
    </div>`;
  }
  if(S.subTab==="themes"){
    return `<div class="card">
      <div class="card-title">主題密度與哲學層次分析</div>
      <div class="card-sub">3–5 個，僅列有場次支撐的命題。</div>
      ${S.themes.map((t,i)=>`<div class="theme-card">
        <div style="display:flex;gap:10px">
          <div style="width:70px"><span class="field-label">標籤</span><input class="field-input mono" value="${esc(t.tag)}" onchange="updateTheme(${i},'tag',this.value)"></div>
          <div style="flex:1"><span class="field-label">標題</span><input class="field-input" value="${esc(t.title)}" onchange="updateTheme(${i},'title',this.value)"></div>
          <button class="btn btn-ghost btn-sm btn-danger" style="height:30px;margin-top:18px" onclick="removeTheme(${i})">✕</button>
        </div>
        <span class="field-label">說明（具體場次證據）</span><textarea class="field-input" style="margin-bottom:0" onchange="updateTheme(${i},'desc',this.value)">${esc(t.desc)}</textarea>
      </div>`).join("")}
      ${S.themes.length<5 ? `<button class="btn btn-sm" onclick="addTheme()">＋ 新增主題</button>` : ""}
    </div>`;
  }
  if(S.subTab==="pacing"){
    return `<div class="card">
      <div class="card-title">節奏風險備註</div>
      <div class="card-sub">術語一律用「狀態戲」；上方 filmstrip 偵測到 3+ 連續狀態戲會自動提示區段，可複製貼入下方。</div>
      <textarea class="field-input" style="min-height:160px;margin-bottom:0" onchange="S.pacingNotes=this.value;render()">${esc(S.pacingNotes)}</textarea>
    </div>`;
  }
  return "";
}

function renderReport(S, fs, bounds, total, plotTotal, staticTotal, errs){
  return `<div id="printable"><div class="report-page">
    <div class="report-title">${esc(S.title||"（未命名劇本）")}　劇本結構分析</div>
    <div class="report-sub">McKee 事件戲 / 狀態戲分類　·　五幕結構　·　角色弧線　·　主題層次　·　結構評估</div>
    <div class="stat-grid">
      <div class="stat-cell"><div class="stat-num">${total}</div><div class="stat-label">scene headings</div></div>
      <div class="stat-cell"><div class="stat-num" style="color:var(--plot)">${plotTotal}</div><div class="stat-label">事件戲 ${total?Math.round(plotTotal*100/total):0}%</div></div>
      <div class="stat-cell"><div class="stat-num" style="color:#BA7517">${staticTotal}</div><div class="stat-label">狀態戲 ${total?Math.round(staticTotal*100/total):0}%</div></div>
      <div class="stat-cell"><div class="stat-num">${S.groups.length}</div><div class="stat-label">場組（視覺聚合）</div></div>
    </div>

    <div class="sec-heading"><span class="sec-n">一</span><span>場次類型分佈（McKee 定義）</span></div>
    <div class="sec-body-text">全片 ${total} 個場次逐一分類，五幕分界：${bounds.map((b,i)=>`${ACT_SHORT[i]} ${b[0]}–${b[1]}`).join("　")}</div>
    ${renderFilmstrip(S.groups)}
    <div class="legend-row"><span><span class="legend-dot" style="background:var(--plot)"></span>事件戲（有價值轉換）</span><span><span class="legend-dot" style="background:var(--static)"></span>狀態戲（無價值轉換）</span></div>
    ${S.pacingNotes ? `<div class="warn-box" style="margin-top:10px">${esc(S.pacingNotes)}</div>` : ""}

    <div class="sec-heading"><span class="sec-n">二</span><span>場組事件戲／狀態戲比例</span></div>
    <div class="sec-body-text">${S.groups.length} 個場組的事件戲 vs 狀態戲數量，由上而下依劇本順序。</div>
    ${renderGroupBars(S.groups)}

    <div class="sec-heading"><span class="sec-n">三</span><span>角色弧線——累積價值分數</span></div>
    <div class="sec-body-text">每個場組依角色得分 +1／−1／0。</div>
    ${renderArcChart(S.groups, S.characters)}

    <div class="sec-heading"><span class="sec-n">四</span><span>角色功能分析（製作人視角）</span></div>
    <div class="profile-grid">
    ${S.profiles.map(p=>`<div class="profile-mini">
      <div style="font-weight:700;margin-bottom:4px">${esc(p.name)}</div>
      <div style="color:var(--muted);margin-bottom:4px">對白：${p.cues} cue</div>
      <div style="color:var(--muted);margin-bottom:2px">Want：${esc(p.want)}</div>
      <div style="color:var(--muted);margin-bottom:2px">Need：${esc(p.need)}</div>
      <div style="color:var(--muted);margin-bottom:4px">→ ${esc(p.arc)}</div>
      ${p.note?`<div style="color:#3C3489;font-size:10.5px">${esc(p.note)}</div>`:""}
    </div>`).join("")}
    </div>

    <div class="sec-heading"><span class="sec-n">五</span><span>主題密度與哲學層次分析</span></div>
    ${S.themes.map(t=>`<div style="display:flex;gap:12px;padding:8px 0;border-bottom:1px solid #F0EEE7">
      <div style="width:30px;font-weight:800;font-size:13px;flex-shrink:0">${esc(t.tag)}</div>
      <div style="font-size:12px;line-height:1.8"><span style="font-weight:700">${esc(t.title)}</span><br><span style="color:var(--muted)">${esc(t.desc)}</span></div>
    </div>`).join("")}

    <div class="sec-heading"><span class="sec-n">六</span><span>結構評估——台詞比重</span></div>
    ${renderCueBars(S.cues)}

    <div style="margin-top:24px;padding-top:14px;border-top:1px solid var(--line)">
      <div class="card-title" style="font-size:12px">交付前自檢對照</div>
      <div class="checklist-item">${errs.length===0?"✓":"⚠"} 資料驗證通過（對應 validate_inputs）</div>
      <div class="checklist-item">✓ 事件戲 ${plotTotal} ＋ 狀態戲 ${staticTotal} ＝ ${plotTotal+staticTotal}（應等於總場次 ${total}）</div>
      <div class="checklist-item">✓ 全文術語一律「事件戲／狀態戲」，無舊稱</div>
      <div class="checklist-item">→ 若需正式交付品質，仍建議另以 v3.4 腳本＋poppler-data rasterize 產出並檢查中文與弧線圖例</div>
    </div>
  </div></div>`;
}

/* ════════════════════════════════════════════════════════════════
   事件處理（全域函式，供 inline onclick/onchange 呼叫）
   ════════════════════════════════════════════════════════════════ */
function render(){ document.getElementById("app").innerHTML = renderApp(); }

function updateGroup(i, field, val){
  const g = S.groups[i];
  if(field==="name") g.name = val;
  else if(field==="act") g.act = Number(val);
  else g[field] = clamp(Number(val)||0, 0, 999);
  render();
}
function addGroup(){ S.groups.push({name:"新場組", act: S.groups.length?S.groups[S.groups.length-1].act:1, plot:0, static:1}); render(); }
function removeGroup(i){ S.groups.splice(i,1); render(); }

function normalizeAllDeltas(){ S.characters.forEach(ch=>{ ch.deltas = normalizeDeltas(ch.deltas, S.groups.length); }); }
function cycleDelta(ci,i){
  normalizeAllDeltas();
  const ch = S.characters[ci];
  const cur = ch.deltas[i];
  ch.deltas[i] = cur===0?1:cur===1?-1:0;
  render();
}
function renameCharacter(ci,val){ if(val) S.characters[ci].name = val; render(); }
function addCharacter(){ S.characters.push({name:`新角色${S.characters.length+1}`, deltas:new Array(S.groups.length).fill(0)}); render(); }
function removeCharacter(ci){ S.characters.splice(ci,1); render(); }

function updateProfile(i,field,val){ S.profiles[i][field] = field==="cues" ? (Number(val)||0) : val; render(); }
function addProfile(){ S.profiles.push({name:"新角色",cues:0,want:"",need:"",arc:"",note:""}); render(); }
function removeProfile(i){ S.profiles.splice(i,1); render(); }

function updateCue(i,field,val){ S.cues[i][field] = field==="count" ? (Number(val)||0) : val; render(); }
function addCue(){ S.cues.push({name:"新角色",count:0}); render(); }
function removeCue(i){ S.cues.splice(i,1); render(); }

function updateTheme(i,field,val){ S.themes[i][field] = val; render(); }
function addTheme(){ if(S.themes.length<5) S.themes.push({tag:`T${S.themes.length+1}`,title:"",desc:""}); render(); }
function removeTheme(i){ S.themes.splice(i,1); render(); }

function copyExport(){
  const ta = document.getElementById("exportTa");
  ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  if(navigator.clipboard){ navigator.clipboard.writeText(ta.value).catch(()=>{}); }
}

function exportPDF(){
  S.mode = "report";
  render();
  setTimeout(()=>window.print(), 150);
}

async function onImportFileSelected(evt){
  const file = evt.target.files[0];
  if(!file) return;
  S.importBusy = true; S.importMsg = `讀取中：${file.name} …`; render();
  try{
    if(/\.pdf$/i.test(file.name)){
      const buf = await file.arrayBuffer();
      const text = await extractPdfText(buf);
      S.importText = text;
      S.importMsg = `已從 PDF 擷取文字（${file.name}），可以按「偵測場景」了。若排版跑掉，改用貼上文字方式較穩。`;
    } else {
      const text = await file.text();
      S.importText = text;
      S.importMsg = `已讀取 ${file.name}，可以按「偵測場景」了。`;
    }
  } catch(err){
    S.importMsg = `讀取失敗：${err.message || err}。可以改用「貼上劇本文字」的方式。`;
  }
  S.importBusy = false;
  render();
}

function runImportDetection(){
  if(!S.importText || !S.importText.trim()){
    S.importMsg = "還沒有文字可以偵測，先上傳檔案或貼上文字。";
    S.importPreview = null;
    render();
    return;
  }
  const re = SCENE_PATTERNS[S.importPatternKey] || SCENE_PATTERNS.auto;
  const matches = detectSceneLines(S.importText, S.importPatternKey);
  S.importPreview = { matches };
  S._importCueRe = re;
  S.importMsg = "";
  render();
}

function confirmImport(mode){
  if(!S.importPreview || S.importPreview.matches.length===0) return;
  const newGroups = S.importPreview.matches.map(m => ({
    name: m.text.length>24 ? m.text.slice(0,24)+"…" : m.text,
    act: 1,
    plot: 0,
    static: 1,
  }));
  S.groups = (mode==="append") ? S.groups.concat(newGroups) : newGroups;
  normalizeAllDeltas();

  if(S.importDetectCues){
    const re = S._importCueRe || SCENE_PATTERNS[S.importPatternKey] || SCENE_PATTERNS.auto;
    const cueGuess = detectCueFrequency(S.importText, re, 15);
    if(cueGuess.length){
      if(mode==="append"){
        cueGuess.forEach(c=>{
          const existing = S.cues.find(x=>x.name===c.name);
          if(existing) existing.count += c.count; else S.cues.push(c);
        });
      } else {
        S.cues = cueGuess;
      }
    }
  }

  S.importOpen = false;
  S.importPreview = null;
  S.mode = "workbench";
  S.subTab = "groups";
  render();
}

render();
</script>
